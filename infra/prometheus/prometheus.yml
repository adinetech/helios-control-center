global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'helios-backend'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['backend:3000']
        labels:
          application: 'helios-backend'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
