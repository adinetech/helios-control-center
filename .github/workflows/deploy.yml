name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Install Docker and Docker Compose if they aren't installed yet
            if ! command -v docker &> /dev/null; then
              echo "Docker not found. Installing Docker..."
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
              sudo usermod -aG docker $USER
              
              # Restart the SSH session so the user group change takes effect
              # However, for this script execution, we will just use 'sudo' for docker commands
              # if the group hasn't applied to this active session yet.
            fi

            # 2. Clone or Pull the repository
            if [ ! -d "helios-control-center" ]; then
              echo "Repository not found. Cloning..."
              git clone https://github.com/adinetech/helios-control-center.git
              cd helios-control-center
            else
              echo "Repository exists. Pulling latest changes..."
              cd helios-control-center
              git pull origin main
            fi

            # 3. Create a placeholder .env file if it doesn't exist 
            # (You will still need to manually edit this file ONE time on the server to add your Tailscale key)
            if [ ! -f ".env" ]; then
              echo "Copying .env.example to .env..."
              cp .env.example .env
            fi
            
            # 4. Rebuild and restart the containers
            # Deploy containers
            sudo docker compose down
            sudo docker compose up -d --build
            
            # Apply database schema updates
            echo "Applying database schema..."
            sleep 10 # wait for postgres to boot
            sudo docker exec helios-backend npx prisma db push --accept-data-loss
            
            # Setup automated daily backup (Midnight daily)
            sudo chmod +x infra/scripts/backup.sh
            (crontab -l 2>/dev/null | grep -v "infra/scripts/backup.sh"; echo "0 0 * * * cd /home/ubuntu/helios-control-center && sudo ./infra/scripts/backup.sh >> /var/log/solarops_backup.log 2>&1") | crontab -
            
            # 5. Prune old images to save disk space
            sudo docker image prune -f
